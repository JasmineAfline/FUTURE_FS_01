<section id="contact" class="py-32 relative overflow-hidden bg-[#0f1115]">
    <div class="absolute top-0 right-0 w-96 h-96 bg-[#f472b6]/5 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-[#a78bfa]/5 blur-[120px] rounded-full"></div>

    <div class="max-w-6xl mx-auto px-6 relative z-10">
        <div class="mb-16 reveal">
            <h2 class="text-5xl md:text-7xl font-bold text-white mb-4 italic tracking-tighter">
                Let's <span class="text-[#f472b6]">Talk.</span>
            </h2>
            <p class="text-slate-500 uppercase tracking-[0.4em] text-xs font-semibold">Available for new opportunities</p>
        </div>

        <div class="grid md:grid-cols-5 gap-8 items-start">
            
            <div class="md:col-span-2 space-y-6 reveal">
                <div class="group glass p-8 rounded-[2rem] border-white/5 hover:border-[#f472b6]/30 transition-all duration-500">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 rounded-2xl bg-[#f472b6]/10 flex items-center justify-center text-[#f472b6] group-hover:scale-110 transition duration-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Phone</p>
                            <p class="text-xl font-bold text-white tracking-tight">+254 715 725 301</p>
                        </div>
                    </div>
                </div>

                <div class="group glass p-8 rounded-[2rem] border-white/5 hover:border-[#a78bfa]/30 transition-all duration-500">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 rounded-2xl bg-[#a78bfa]/10 flex items-center justify-center text-[#a78bfa] group-hover:scale-110 transition duration-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Email</p>
                            <p class="text-xl font-bold text-white tracking-tight">afline47@gmail.com</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-3 reveal">
                <form class="glass p-10 md:p-12 rounded-[3rem] border-white/5 space-y-6 shadow-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Full Name</label>
                            <input type="text" placeholder="Afline Jasmine" class="w-full bg-[#1a1d23] border border-white/5 px-6 py-4 rounded-2xl focus:border-[#f472b6] outline-none transition text-white placeholder:text-slate-600">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Email Address</label>
                            <input type="email" placeholder="example@email.com" class="w-full bg-[#1a1d23] border border-white/5 px-6 py-4 rounded-2xl focus:border-[#a78bfa] outline-none transition text-white placeholder:text-slate-600">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Your Message</label>
                        <textarea rows="5" placeholder="Tell me about your project..." class="w-full bg-[#1a1d23] border border-white/5 px-6 py-4 rounded-2xl focus:border-[#f472b6] outline-none transition text-white resize-none placeholder:text-slate-600"></textarea>
                    </div>
                    <button class="w-full py-5 bg-white text-[#0f1115] font-black rounded-2xl hover:bg-[#f472b6] hover:text-white transition-all duration-500 shadow-xl shadow-white/5 uppercase tracking-[0.2em] text-xs">
                        Send Message
                    </button>
                </form>
            </div>
        </div>

        <footer class="mt-32 pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-slate-500 text-sm">
            <p>© 2026 <span class="text-white font-medium">Afline Jasmine</span>. All rights reserved.</p>
            <div class="flex gap-8 font-bold uppercase tracking-widest text-[10px]">
                <a href="#" class="hover:text-[#f472b6] transition">LinkedIn</a>
                <a href="#" class="hover:text-[#a78bfa] transition">GitHub</a>
                <a href="#" class="hover:text-[#f472b6] transition">Twitter</a>
            </div>
        </footer>
